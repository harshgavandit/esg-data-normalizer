services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: breathe_esg
      POSTGRES_USER: breathe
      POSTGRES_PASSWORD: breathe
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breathe -d breathe_esg"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:

